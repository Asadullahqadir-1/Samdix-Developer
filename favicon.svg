<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Samdix favicon">
  <!-- rounded purple background -->
  <rect width="64" height="64" rx="12" fill="#7c3aed" />
  <!-- top-right white arrow pointing right -->
  <polygon points="18,10 38,32 18,32" fill="#ffffff" />
  <!-- bottom-left white arrow pointing left -->
  <polygon points="46,54 26,32 46,32" fill="#ffffff" />
  <!-- top-left purple arrow (overlay for X effect) -->
  <polygon points="18,32 38,32 18,54" fill="#a855f7" />
  <!-- bottom-right purple arrow -->
  <polygon points="46,32 26,32 46,10" fill="#a855f7" />
</svg>
